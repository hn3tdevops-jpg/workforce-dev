{% extends 'base.html' %}
{% block title %}Projects – DevHub{% endblock %}
{% block content %}
<h1 class="mb-4"><i class="bi bi-folder"></i> Projects</h1>
<div class="row g-3">
  {% for project in projects %}
  <div class="col-md-4">
    <div class="card h-100">
      <div class="card-body">
        <h5 class="card-title">
          <a href="{{ url_for('projects.detail', slug=project.slug) }}">{{ project.name }}</a>
        </h5>
        <p class="card-text text-muted">{{ project.description or '' }}</p>
        <span class="badge bg-{{ 'success' if project.status == 'active' else 'secondary' }}">
          {{ project.status }}
        </span>
      </div>
    </div>
  </div>
  {% else %}
  <div class="col"><p class="text-muted">No projects. Run <code>flask seed</code>.</p></div>
  {% endfor %}
</div>
{% endblock %}
