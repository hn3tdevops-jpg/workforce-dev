{% extends 'base.html' %}
{% block title %}Upload Package - DevHub{% endblock %}
{% block content %}
<h2>Upload Package</h2>
<form method="POST" enctype="multipart/form-data">
  <div class="mb-3">
    <label class="form-label">ZIP file</label>
    <input type="file" class="form-control" name="file" accept=".zip" required>
  </div>
  <button type="submit" class="btn btn-primary">Upload</button>
  <a href="{{ url_for('packages.index') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
